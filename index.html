<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الشخصية - اكتشف شخصيتك الأنمي المناسبة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Tajawal', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            direction: rtl;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            width: 100%;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .questions-area {
            padding: 30px;
            min-height: 500px;
        }

        .question-card {
            display: none;
        }

        .question-card.active {
            display: block;
        }

        .question-text {
            font-size: 22px;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.4;
            font-weight: 500;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: #f5f5f5;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .option:hover {
            background: #e8e8e8;
            transform: translateX(-5px);
        }

        .option.selected {
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            border-color: #764ba2;
        }

        .option input {
            margin-left: 15px;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .option label {
            flex: 1;
            cursor: pointer;
            font-size: 16px;
            color: #333;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }

        .nav-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .prev-btn {
            background: #e0e0e0;
            color: #666;
        }

        .prev-btn:hover {
            background: #d0d0d0;
        }

        .next-btn, .submit-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .next-btn:hover, .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        .gender-section {
            background: #f9f9f9;
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
            text-align: center;
        }

        .gender-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .gender-btn {
            padding: 12px 30px;
            border: 2px solid #764ba2;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .gender-btn.selected {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .result-area {
            padding: 30px;
            display: none;
        }

        .result-card {
            text-align: center;
        }

        .personality-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .personality-code {
            font-size: 36px;
            font-weight: bold;
        }

        .personality-name {
            font-size: 24px;
            margin-top: 10px;
        }

        .anime-character {
            margin-top: 20px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 15px;
        }

        .character-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 15px auto;
            display: block;
            border: 4px solid #764ba2;
        }

        .character-name {
            font-size: 28px;
            color: #764ba2;
            margin: 15px 0;
        }

        .character-desc {
            color: #666;
            line-height: 1.6;
            text-align: justify;
        }

        .strengths, .weaknesses {
            text-align: right;
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
        }

        .strengths {
            background: #e8f5e9;
            border-right: 4px solid #4caf50;
        }

        .weaknesses {
            background: #ffebee;
            border-right: 4px solid #f44336;
        }

        .strengths h4, .weaknesses h4 {
            margin-bottom: 10px;
        }

        .strengths ul, .weaknesses ul {
            padding-right: 20px;
        }

        .strengths li, .weaknesses li {
            margin: 8px 0;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 50px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #764ba2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin: 20px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .questions-area {
                padding: 20px;
            }
            .question-text {
                font-size: 18px;
            }
            .option label {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

        let questions = [];
        let currentQuestionIndex = 0;
        let userAnswers = [];
        let selectedGender = null;

        // جلب الأسئلة من API
        async function fetchQuestions() {
            try {
                const response = await fetch('https://16personalities-api.com/api/personality/questions');
                if (!response.ok) throw new Error('فشل في جلب الأسئلة');
                const data = await response.json();
                questions = data;
                userAnswers = new Array(questions.length).fill(null);
                renderQuestions();
                updateProgress();
            } catch (error) {
                console.error('Error fetching questions:', error);
                document.getElementById('questionsContainer').innerHTML = `
                    <div class="error-message">
                        ⚠️ عذراً، حدث خطأ في تحميل الأسئلة. يرجى تحديث الصفحة والمحاولة مرة أخرى.
                    </div>
                `;
            }
        }

        // عرض الأسئلة
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            
            questions.forEach((q, idx) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                if (idx === 0) card.classList.add('active');
                card.dataset.index = idx;
                
                // ترجمة قيم الإجابات
                const answerOptions = [
                    { value: -3, label: 'لا أوافق بشدة' },
                    { value: -2, label: 'لا أوافق إلى حد ما' },
                    { value: -1, label: 'لا أوافق قليلاً' },
                    { value: 0, label: 'محايد' },
                    { value: 1, label: 'أوافق قليلاً' },
                    { value: 2, label: 'أوافق إلى حد ما' },
                    { value: 3, label: 'أوافق بشدة' }
                ];
                
                card.innerHTML = `
                    <div class="question-text">${q.text}</div>
                    <div class="options">
                        ${answerOptions.map(opt => `
                            <div class="option ${userAnswers[idx] === opt.value ? 'selected' : ''}" data-value="${opt.value}">
                                <input type="radio" name="q${idx}" value="${opt.value}" id="q${idx}_${opt.value}" ${userAnswers[idx] === opt.value ? 'checked' : ''}>
                                <label for="q${idx}_${opt.value}">${opt.label}</label>
                            </div>
                        `).join('')}
                    </div>
                `;
                
                container.appendChild(card);
            });
            
            attachOptionListeners();
        }
        
        function attachOptionListeners() {
            document.querySelectorAll('.option').forEach(opt => {
                opt.addEventListener('click', (e) => {
                    const radio = opt.querySelector('input');
                    if (radio) {
                        radio.checked = true;
                        const value = parseInt(opt.dataset.value);
                        const card = opt.closest('.question-card');
                        const index = parseInt(card.dataset.index);
                        userAnswers[index] = value;
                        
                        // تحديث المظهر
                        card.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                        opt.classList.add('selected');
                    }
                });
            });
        }
        
        function updateProgress() {
            const answered = userAnswers.filter(a => a !== null).length;
            const percentage = (answered / questions.length) * 100;
            document.getElementById('progressFill').style.width = `${percentage}%`;
        }
        
        function showQuestion(index) {
            document.querySelectorAll('.question-card').forEach((card, i) => {
                if (i === index) card.classList.add('active');
                else card.classList.remove('active');
            });
            
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const submitBtn = document.getElementById('submitBtn');
            
            prevBtn.style.display = index === 0 ? 'none' : 'block';
            
            if (index === questions.length - 1) {
                nextBtn.style.display = 'none';
                submitBtn.style.display = 'block';
            } else {
                nextBtn.style.display = 'block';
                submitBtn.style.display = 'none';
            }
        }
        
        // إرسال الإجابات للتحليل
        async function submitAnswers() {
            // التحقق من الإجابة على جميع الأسئلة
            if (userAnswers.includes(null)) {
                alert('الرجاء الإجابة على جميع الأسئلة قبل المتابعة');
                return;
            }
            
            if (!selectedGender) {
                alert('الرجاء اختيار الجنس');
                return;
            }
            
            // إخفاء الأسئلة وإظهار شاشة التحميل
            document.getElementById('questionsArea').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            try {
                // تحضير الإجابات للإرسال
                const answersPayload = questions.map((q, idx) => ({
                    id: q._id || q.id,
                    value: userAnswers[idx]
                }));
                
                const response = await fetch('https://16personalities-api.com/api/personality', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        answers: answersPayload,
                        gender: selectedGender
                    })
                });
                
                if (!response.ok) throw new Error('فشل في تحليل الشخصية');
                
                const result = await response.json();
                showResult(result);
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('questionsArea').style.display = 'block';
                alert('حدث خطأ في تحليل الشخصية. يرجى المحاولة مرة أخرى.');
            }
        }
        
        function showResult(personalityResult) {
            document.getElementById('loading').style.display = 'none';
            
            const personalityCode = personalityResult.fullCode; // مثل INTJ-A
            const baseCode = personalityCode.split('-')[0]; // INTJ
            
            const animeMatch = personalityToAnime[baseCode] || personalityToAnime['INFP'];
            
            const resultArea = document.getElementById('resultArea');
            resultArea.style.display = 'block';
            resultArea.innerHTML = `
                <div class="result-card">
                    <div class="personality-badge">
                        <div class="personality-code">${personalityResult.fullCode || baseCode}</div>
                        <div class="personality-name">${personalityResult.niceName || 'شخصيتك'}</div>
                    </div>
                    
                    <div class="anime-character">
                        <h3>🎬 الشخصية الأنمي المناسبة لك:</h3>
                        <img src="${animeMatch.image}" alt="${animeMatch.character}" class="character-image" onerror="this.src='https://via.placeholder.com/150?text=${animeMatch.character}'">
                        <div class="character-name">${animeMatch.character}</div>
                        <div class="character-source">من ${animeMatch.anime}</div>
                        <div class="character-desc">${animeMatch.description}</div>
                        
                        <div class="strengths">
                            <h4>✅ نقاط القوة</h4>
                            <ul>
                                ${animeMatch.strengths.map(s => `<li>${s}</li>`).join('')}
                            </ul>
                        </div>
                        
                        <div class="weaknesses">
                            <h4>⚠️ نقاط الضعف</h4>
                            <ul>
                                ${animeMatch.weaknesses.map(w => `<li>${w}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                    
                    <p style="margin-top: 20px; text-align: center; color: #666;">
                        ${selectedGender === 'Male' ? 'أنت' : selectedGender === 'Female' ? 'أنتِ' : 'أنت'} تشبه هذه الشخصية في كثير من الصفات!
                    </p>
                </div>
            `;
        }
        
        // التنقل بين الأسئلة
        document.getElementById('nextBtn').addEventListener('click', () => {
            if (userAnswers[currentQuestionIndex] !== null) {
                currentQuestionIndex++;
                showQuestion(currentQuestionIndex);
                updateProgress();
            } else {
                alert('الرجاء الإجابة على السؤال الحالي قبل المتابعة');
            }
        });
        
        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showQuestion(currentQuestionIndex);
            }
        });
        
        document.getElementById('submitBtn').addEventListener('click', submitAnswers);
        
        // اختيار الجنس
        document.querySelectorAll('.gender-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedGender = btn.dataset.gender;
            });
        });
        
        // بدء التطبيق
        fetchQuestions();
    </script>
</body>
</html>
