<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>اختبار الشخصية - اكتشف نمط شخصيتك</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            direction: rtl;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 6px;
            width: 100%;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .questions-area {
            padding: 30px;
            min-height: 500px;
        }

        .question-card {
            display: none;
        }

        .question-card.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-text {
            font-size: 22px;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.5;
            font-weight: 500;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            background: #f5f5f5;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .option:hover {
            background: #e8e8e8;
            transform: translateX(-5px);
        }

        .option.selected {
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            border-color: #764ba2;
        }

        .option input {
            margin-left: 15px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #764ba2;
        }

        .option label {
            flex: 1;
            cursor: pointer;
            font-size: 16px;
            color: #333;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }

        .nav-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .prev-btn {
            background: #e0e0e0;
            color: #666;
        }

        .prev-btn:hover {
            background: #d0d0d0;
        }

        .next-btn, .submit-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .next-btn:hover, .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        .gender-section {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 20px;
            margin-top: 20px;
            text-align: center;
        }

        .gender-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .gender-btn {
            padding: 10px 25px;
            border: 2px solid #764ba2;
            background: white;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .gender-btn.selected {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .result-area {
            padding: 30px;
            display: none;
        }

        .result-card {
            text-align: center;
        }

        .personality-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 25px;
        }

        .personality-code {
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .personality-name {
            font-size: 24px;
            margin-top: 10px;
        }

        .personality-desc {
            margin-top: 20px;
            line-height: 1.7;
            text-align: justify;
        }

        .dimensions {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin: 20px 0;
        }

        .dimension {
            flex: 1;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .dimension-letter {
            font-size: 28px;
            font-weight: bold;
            color: #764ba2;
        }

        .dimension-name {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        .traits {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .trait {
            background: #e8e8e8;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: #555;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 50px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #764ba2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .questions-area { padding: 20px; }
            .question-text { font-size: 18px; }
            .option label { font-size: 14px; }
            .personality-code { font-size: 32px; }
            .dimensions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌟 اكتشف نمط شخصيتك 🌟</h1>
            <p>أجب عن الأسئلة التالية بدقة لتعرف أي النماذج الشخصية الـ16 يناسبك</p>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="questions-area" id="questionsArea">
            <div id="questionsContainer"></div>
            
            <div class="gender-section" id="genderSection">
                <h3>⚥ أخبرنا عن جنسك (لتخصيص النتيجة)</h3>
                <div class="gender-buttons">
                    <button class="gender-btn" data-gender="Male">👨 ذكر</button>
                    <button class="gender-btn" data-gender="Female">👩 أنثى</button>
                    <button class="gender-btn" data-gender="Other">🌈 آخر</button>
                </div>
            </div>

            <div class="navigation">
                <button class="nav-btn prev-btn" id="prevBtn">السابق</button>
                <button class="nav-btn next-btn" id="nextBtn">التالي</button>
                <button class="nav-btn submit-btn" id="submitBtn" style="display: none;">تحليل شخصيتي</button>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>جاري تحليل شخصيتك...</p>
        </div>

        <div class="result-area" id="resultArea"></div>
    </div>

    <script>
        // 40 سؤالاً مصممة بعناية لقياس الأبعاد الأربعة للشخصية
        const questions = [
            { text: "أشعر بالنشاط والطاقة بعد قضاء وقت مع مجموعة من الناس.", dim: "EI", reverse: false },

            { text: "أفضل التخطيط المسبق والالتزام بالجدول على العفوية.", dim: "JP", reverse: false },
            { text: "أشعر بالتعب والإرهاق بعد التجمعات الاجتماعية الطويلة.", dim: "EI", reverse: true },
            { text: "أميل إلى التفكير في الاحتمالات المستقبلية والإمكانيات.", dim: "SN", reverse: false },
            { text: "أهتم كثيراً بمشاعر الآخرين وأتأثر بها.", dim: "TF", reverse: true },
            { text: "أحب ترك خياراتي مفتوحة وعدم الالتزام بخطط صارمة.", dim: "JP", reverse: true },
            { text: "أفضل العمل بمفردي على العمل ضمن فريق.", dim: "EI", reverse: true },
            { text: "أعتمد على حدسي وتخميني أكثر من الحقائق المجردة.", dim: "SN", reverse: false },
            { text: "العدالة والموضوعية أهم عندي من التعاطف.", dim: "TF", reverse: false },
            { text: "أشعر بالارتياح عندما تكون أموري منظمة ومرتبة.", dim: "JP", reverse: false },
            { text: "أتحدث مع كثير من الناس في الحفلات والمناسبات.", dim: "EI", reverse: false },
            { text: "أحب التعلم النظري والفلسفي أكثر من التطبيقي.", dim: "SN", reverse: false },
            { text: "أشعر بآلام الآخرين وكأنها آلامي.", dim: "TF", reverse: true },
            { text: "أتخذ القرارات بسرعة ولا أتردد كثيراً.", dim: "JP", reverse: false },
            { text: "أفضّل المحادثات العميقة مع شخص واحد على المحادثات السطحية مع مجموعة.", dim: "EI", reverse: true },
            { text: "أهتم بالواقع العملي أكثر من الخيال والنظريات.", dim: "SN", reverse: true },
            { text: "الانسجام العاطفي مهم عندي أكثر من المنطق.", dim: "TF", reverse: true },
            { text: "أكره التأخير وألتزم بالمواعيد بدقة.", dim: "JP", reverse: false },
            { text: "أستمتع بكوني مركز الاهتمام.", dim: "EI", reverse: false },
            { text: "أحب الابتكار والخروج عن المألوف.", dim: "SN", reverse: false },
            { text: "أواجه الصعوبات بمنطقية وهدوء.", dim: "TF", reverse: false },
            { text: "أفضل المهام المحددة والواضحة على المهام المفتوحة.", dim: "JP", reverse: false },
            { text: "أحتاج وقتاً لوحدي لأسترخي وأشحن طاقتي.", dim: "EI", reverse: true },
            { text: "أحب التحدث عن الأفكار والمفاهيم الكبيرة.", dim: "SN", reverse: false },
            { text: "الرحمة والتسامح أهم عندي من العدالة.", dim: "TF", reverse: true },
            { text: "أستمتع بالمفاجآت والأمور غير المتوقعة.", dim: "JP", reverse: true },
            { text: "أتعرف على أشخاص جدد بسهولة في المناسبات.", dim: "EI", reverse: false },
            { text: "أفضل العمل العملي على العمل النظري.", dim: "SN", reverse: true },
            { text: "أحلل الأمور بموضوعية حتى لو جرحت مشاعر الآخرين.", dim: "TF", reverse: false },
            { text: "أخطط لرحلاتي وإجازاتي بدقة قبل السفر.", dim: "JP", reverse: false },
            { text: "أشعر بالوحدة حتى عندما أكون بين الناس.", dim: "EI", reverse: true },
            { text: "أحب خوض تجارب جديدة ومختلفة.", dim: "SN", reverse: false },
            { text: "أفضل العدالة على الرحمة.", dim: "TF", reverse: false },
            { text: "أغير خططي بسهولة حسب الظروف.", dim: "JP", reverse: true },
            { text: "أستمتع بالعمل في بيئة تعاونية واجتماعية.", dim: "EI", reverse: false },
            { text: "أحب تحليل الأمور وفهم أسبابها.", dim: "SN", reverse: false },
            { text: "أشعر بقلق عندما يكون شخص ما منزعجاً.", dim: "TF", reverse: true },
            { text: "أنجز مهامي قبل الموعد المطلوب.", dim: "JP", reverse: false }
        ];

        // أوصاف أنماط الشخصية الـ16
        const personalityTypes = {
            'INTJ': { name: 'الإستراتيجي', 
              desc: 'أنت مفكر استراتيجي، تحب التخطيط طويل المدى وتحليل الأنظمة المعقدة. تثق بحدسك وعقلك أكثر من مشاعرك، وتسعى دائماً لتطوير نفسك وتحقيق أهدافك الطموحة.',
              traits: ['استراتيجي', 'طموح', 'واثق', 'مستقل', 'منطقي'] },
            'INTP': { name: 'المفكر', 
              desc: 'أنت فيلسوف وعالم في القلب، تحب تحليل الأفكار والنظريات. تفضل المنطق والموضوعية، وتستمتع باستكشاف الأفكار المجردة وحل المشكلات المعقدة.',
              traits: ['تحليلي', 'إبداعي', 'فضولي', 'موضوعي', 'مرن'] },
            'ENTJ': { name: 'القائد', 
              desc: 'أنت قائد بالفطرة، تمتلك رؤية واضحة وتستطيع تحفيز الآخرين لتحقيق الأهداف. تثق بقدراتك وتتخذ القرارات بثقة وحزم.',
              traits: ['قائد', 'طموح', 'واثق', 'منظم', 'حاسم'] },
            'ENTP': { name: 'المبتكر', 
              desc: 'أنت مبدع ومناقش ماهر، تحب تحدي الأفكار السائدة واستكشاف الاحتمالات. تفكيرك سريع ومرن، وتستمتع بالنقاشات الفكرية.',
              traits: ['مبدع', 'ذكي', 'مناقش', 'مرن', 'فضولي'] },
            'INFJ': { name: 'الحالم', 
              desc: 'أنت شخص عميق ومثالي، تمتلك حدساً قوياً وفهماً عميقاً للآخرين. تسعى لإحداث تغيير إيجابي في العالم، وتقدر العلاقات العميقة.',
              traits: ['مثالي', 'حساس', 'مبدع', 'حكيم', 'ملهم'] },
            'INFP': { name: 'الشاعر', 
              desc: 'أنت شاعر وروائي في القلب، تمتلك عالماً داخلياً غنياً بالقيم والمشاعر. تسعى للأصالة والانسجام، وتقدر الجمال والمعنى في الحياة.',
              traits: ['مثالي', 'مبدع', 'حساس', 'صادق', 'شغوف'] },
            'ENFJ': { name: 'المعلم', 
              desc: 'أنت معلم وملهم بالفطرة، تفهم مشاعر الآخرين وتساعدهم على النمو. تمتلك كاريزما طبيعية وتستطيع تحفيز الناس لتحقيق إمكاناتهم.',
              traits: ['ملهم', 'اجتماعي', 'رحيم', 'كاريزمي', 'منظم'] },
            'ENFP': { name: 'المستكشف', 
              desc: 'أنت روح حرة ومتحمسة، تحب الاستكشاف والتجارب الجديدة. تمتلك طاقة إيجابية تجذب الناس إليك، وتقدر الأصالة والتعبير الذاتي.',
              traits: ['حماسي', 'مبدع', 'اجتماعي', 'مرن', 'فضولي'] },
            'ISTJ': { name: 'العملي', 
              desc: 'أنت شخص عملي وموثوق، تعتمد على الحقائق والمنطق. تلتزم بالتزاماتك وتقدر النظام والتنظيم، وتفضل المهام الواضحة والمحددة.',
              traits: ['موثوق', 'منظم', 'عملي', 'صبور', 'مخلص'] },
            'ISFJ': { name: 'الحامي', 
              desc: 'أنت شخص دافئ ومخلص، تضع احتياجات الآخرين قبل احتياجاتك. تمتلك ذاكرة ممتازة للتفاصيل وتقدر التقاليد والروتين.',
              traits: ['مخلص', 'راعي', 'صبور', 'عملي', 'متواضع'] },
            'ESTJ': { name: 'المنفذ', 
              desc: 'أنت منفذ فعال وحازم، تؤمن بالنظام والقوانين. تتخذ القرارات بسرعة وثقة، وتتوقع من الآخرين نفس المستوى من الالتزام.',
              traits: ['حازم', 'منظم', 'عملي', 'طموح', 'موثوق'] },
            'ESFJ': { name: 'الراعي', 
              desc: 'أنت شخص اجتماعي ورحيم، تهتم باحتياجات الآخرين وتسعى لخلق الانسجام. تقدر العلاقات والتقاليد، وتستمتع بمساعدة الناس.',
              traits: ['اجتماعي', 'رحيم', 'منظم', 'مخلص', 'عملي'] },
            'ISTP': { name: 'الماهر', 
              desc: 'أنت شخص ماهر وعملي، تفضل التعلم بالممارسة على النظرية. تتعامل مع الأزمات بهدوئك المعتاد، وتستمتع بحل المشكلات العملية.',
              traits: ['ماهر', 'هادئ', 'مرن', 'عملي', 'مستقل'] },
            'ISFP': { name: 'الفنان', 
              desc: 'أنت فنان وحساس، تعبر عن نفسك من خلال الفن والإبداع. تفضل الحرية والمرونة، وتقدر الجمال والأصالة في الحياة.',
              traits: ['فنان', 'حساس', 'مرن', 'صادق', 'عطوف'] },
            'ESTP': { name: 'المغامر', 
              desc: 'أنت مغامر وجريء، تعيش اللحظة وتسعى للإثارة. تتصرف بسرعة وثقة، وتستمتع بالمخاطرة والتحديات الجديدة.',
              traits: ['جريء', 'مرن', 'عملي', 'شجاع', 'اجتماعي'] },
            'ESFP': { name: 'المؤدي', 
              desc: 'أنت مؤدي وروح الحفلات، تحب إسعاد الناس وجذب انتباههم. تعيش اللحظة بأقصى درجاتها وتستمتع بالتجارب الجديدة.',
              traits: ['اجتماعي', 'حماسي', 'مرن', 'عفوي', 'مرح'] }
        };

        let currentIndex = 0;
        let answers = new Array(40).fill(null);
        let selectedGender = null;
        let scores = { EI: 0, SN: 0, TF: 0, JP: 0 };

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            
            questions.forEach((q, idx) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                if (idx === 0) card.classList.add('active');
                card.dataset.index = idx;
                
                const opts = [
                    { val: 1, label: 'لا أوافق بشدة' },
                    { val: 2, label: 'لا أوافق' },
                    { val: 3, label: 'محايد' },
                    { val: 4, label: 'أوافق' },
                    { val: 5, label: 'أوافق بشدة' }
                ];
                
                card.innerHTML = `
                    <div class="question-text">${idx+1}. ${q.text}</div>
                    <div class="options">
                        ${opts.map(opt => `
                            <div class="option ${answers[idx] === opt.val ? 'selected' : ''}" data-value="${opt.val}">
                                <input type="radio" name="q${idx}" value="${opt.val}" id="q${idx}_${opt.val}" ${answers[idx] === opt.val ? 'checked' : ''}>
                                <label for="q${idx}_${opt.val}">${opt.label}</label>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(card);
            });
            
            attachEvents();
        }

        function attachEvents() {
            document.querySelectorAll('.option').forEach(opt => {
                opt.addEventListener('click', function() {
                    const radio = this.querySelector('input');
                    if (radio) {
                        radio.checked = true;
                        const val = parseInt(this.dataset.value);
                        const card = this.closest('.question-card');
                        const idx = parseInt(card.dataset.index);
                        answers[idx] = val;
                        updateScore(idx, val);
                        
                        card.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                        this.classList.add('selected');
                        updateProgress();
                    }
                });
            });
        }

        function updateScore(questionIndex, value) {
            const q = questions[questionIndex];
            let score = value;
            if (q.reverse) score = 6 - value;
            
            switch(q.dim) {
                case 'EI': scores.EI += score; break;
                case 'SN': scores.SN += score; break;
                case 'TF': scores.TF += score; break;
                case 'JP': scores.JP += score; break;
            }
        }

        function updateProgress() {
            const answered = answers.filter(a => a !== null).length;
            const percent = (answered / 40) * 100;
            document.getElementById('progressFill').style.width = `${percent}%`;
        }

        function showQuestion(index) {
            document.querySelectorAll('.question-card').forEach((card, i) => {
                if (i === index) card.classList
