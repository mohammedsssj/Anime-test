<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الشخصية السريع</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: Arial, sans-serif;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
        }
        h1 { text-align: center; color: #764ba2; }
        .question {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .options { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 15px; }
        .option {
            background: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            border: 1px solid #ddd;
        }
        .option.selected { background: #764ba2; color: white; border-color: #764ba2; }
        .gender-buttons { display: flex; gap: 15px; justify-content: center; margin: 20px 0; }
        .gender-btn {
            padding: 10px 25px;
            border: 2px solid #764ba2;
            border-radius: 25px;
            cursor: pointer;
            background: white;
        }
        .gender-btn.selected { background: #764ba2; color: white; }
        button {
            background: #764ba2;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        .result { margin-top: 20px; padding: 20px; background: #f0f0f0; border-radius: 15px; display: none; }
        .character-img { width: 120px; border-radius: 50%; display: block; margin: 0 auto; }
        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #764ba2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎭 اختبار الشخصية السريع</h1>
    <p style="text-align: center;">أجب عن الأسئلة التالية</p>

    <div id="questions"></div>

    <div class="gender-buttons" id="genderSection">
        <div class="gender-btn" data-gender="Male">👨 ذكر</div>
        <div class="gender-btn" data-gender="Female">👩 أنثى</div>
    </div>

    <button id="submitBtn">✨ تحليل شخصيتي ✨</button>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>جاري التحليل...</p>
    </div>

    <div class="result" id="result"></div>
</div>

<script>
    const questionsList = [
        "أفضل العمل ضمن فريق بدلاً من العمل بمفردي.",
        "أستمتع باللقاءات الاجتماعية والتعرّف على أناس جدد.",
        "أتخذ قراري بناءً على المنطق أكثر من المشاعر.",
        "أفضل أن تكون لدي خطة محكمة بدلاً من العشوائية.",
        "أهتم بمشاعر الآخرين قبل المنطق في كثير من الأحيان."
    ];

    let answers = [null, null, null, null, null];
    let selectedGender = null;

    function renderQuestions() {
        const container = document.getElementById('questions');
        container.innerHTML = '';
        questionsList.forEach((q, idx) => {
            const div = document.createElement('div');
            div.className = 'question';
            div.innerHTML = `
                <div><strong>${idx+1}. ${q}</strong></div>
                <div class="options">
                    <div class="option" data-q="${idx}" data-val="1">لا أوافق</div>
                    <div class="option" data-q="${idx}" data-val="3">محايد</div>
                    <div class="option" data-q="${idx}" data-val="5">أوافق</div>
                </div>
            `;
            container.appendChild(div);
        });

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', function() {
                const qIdx = parseInt(this.dataset.q);
                const val = parseInt(this.dataset.val);
                answers[qIdx] = val;
                
                // إزالة التحديد السابق وإضافة التحديد الجديد
                const parent = this.closest('.question');
                parent.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
            });
        });
    }

    // أزرار الجنس
    document.querySelectorAll('.gender-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('selected'));
            this.classList.add('selected');
            selectedGender = this.dataset.gender;
        });
    });

    function analyzePersonality() {
        // حساب بسيط: إذا كان مجموع أول سؤالين كبير = انبساط
        let total = 0;
        for(let i = 0; i < 5; i++) {
            if(answers[i]) total += answers[i];
        }
        
        if(total > 15) {
            return { name: "Amethyst", anime: "Steven Universe", img: "https://i.ibb.co/VpzJLxt6/42-423110-steven-universe-amethyst-amethyst-from-steven-universe-costume.jpg", desc: "شخصية مرحة ومفعمة بالطاقة، تحب المرح والمغامرة، مخلصة جداً لأصدقائها." };
        } else {
            return { name: "Sukuna", anime: "Jujutsu Kaisen", img: "https://i.ibb.co/pryzgBYY/images-2-1.jpg", desc: "شخصية قوية ومهيمنة، تثق بنفسها وبقوتها، لا تخضع لأي سلطة." };
        }
    }

    document.getElementById('submitBtn').addEventListener('click', () => {
        // التحقق من الإجابات
        if(answers.includes(null)) {
            alert("الرجاء الإجابة على جميع الأسئلة!");
            return;
        }
        if(!selectedGender) {
            alert("الرجاء اختيار الجنس!");
            return;
        }

        // إظهار شاشة التحميل
        document.getElementById('submitBtn').style.display = 'none';
        document.getElementById('loading').style.display = 'block';
        document.getElementById('genderSection').style.display = 'none';
        document.getElementById('questions').style.display = 'none';

        // محاكاة تحميل 2 ثانية
        setTimeout(() => {
            const result = analyzePersonality();
            const resultDiv = document.getElementById('result');
            const pronoun = selectedGender === 'Female' ? 'أنتِ' : 'أنت';
            
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <h2>✨ شخصيتك الأنمي المناسبة ✨</h2>
                <img src="${result.img}" class="character-img" onerror="this.src='https://via.placeholder.com/120'">
                <h3 style="text-align:center; color:#764ba2;">${result.name}</h3>
                <p style="text-align:center; color:#999;">من ${result.anime}</p>
                <p style="line-height:1.6;">${pronoun} ${result.desc}</p>
            `;
            document.getElementById('loading').style.display = 'none';
        }, 2000);
    });

    renderQuestions();
</script>
</body>
</html>
