<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>اختبار الشخصية - اكتشف شخصيتك الأنمي المناسبة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            direction: rtl;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            width: 100%;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .questions-area {
            padding: 30px;
            min-height: 500px;
        }

        .question-card {
            display: none;
        }

        .question-card.active {
            display: block;
        }

        .question-text {
            font-size: 20px;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.5;
            font-weight: 500;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 12px 18px;
            background: #f5f5f5;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .option:hover {
            background: #e8e8e8;
            transform: translateX(-5px);
        }

        .option.selected {
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            border-color: #764ba2;
        }

        .option input {
            margin-left: 15px;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .option label {
            flex: 1;
            cursor: pointer;
            font-size: 15px;
            color: #333;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }

        .nav-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .prev-btn {
            background: #e0e0e0;
            color: #666;
        }

        .next-btn, .submit-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .gender-section {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            text-align: center;
        }

        .gender-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .gender-btn {
            padding: 10px 25px;
            border: 2px solid #764ba2;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .gender-btn.selected {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .result-area {
            padding: 30px;
            display: none;
        }

        .result-card {
            text-align: center;
        }

        .personality-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .personality-code {
            font-size: 36px;
            font-weight: bold;
        }

        .anime-character {
            margin-top: 20px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 15px;
        }

        .character-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 15px auto;
            display: block;
            border: 4px solid #764ba2;
        }

        .character-name {
            font-size: 26px;
            color: #764ba2;
            margin: 15px 0 5px;
        }

        .character-source {
            color: #999;
            margin-bottom: 15px;
        }

        .character-desc {
            color: #555;
            line-height: 1.6;
            text-align: justify;
        }

        .strengths, .weaknesses {
            text-align: right;
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
        }

        .strengths {
            background: #e8f5e9;
            border-right: 4px solid #4caf50;
        }

        .weaknesses {
            background: #ffebee;
            border-right: 4px solid #f44336;
        }

        .strengths h4, .weaknesses h4 {
            margin-bottom: 10px;
            color: #333;
        }

        .strengths ul, .weaknesses ul {
            padding-right: 20px;
        }

        .strengths li, .weaknesses li {
            margin: 8px 0;
            color: #555;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 50px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #764ba2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .questions-area { padding: 20px; }
            .question-text { font-size: 18px; }
            .option label { font-size: 13px; }
            .character-name { font-size: 22px; }
        }
    </style>
</head>
<body>

        let currentIndex = 0;
        let answers = new Array(30).fill(null);
        let selectedGender = null;

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            
            questions.forEach((q, idx) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                if (idx === 0) card.classList.add('active');
                card.dataset.index = idx;
                
                const opts = [
                    { val: 1, label: 'لا أوافق بشدة' },
                    { val: 2, label: 'لا أوافق' },
                    { val: 3, label: 'محايد' },
                    { val: 4, label: 'أوافق' },
                    { val: 5, label: 'أوافق بشدة' }
                ];
                
                card.innerHTML = `
                    <div class="question-text">${idx+1}. ${q}</div>
                    <div class="options">
                        ${opts.map(opt => `
                            <div class="option ${answers[idx] === opt.val ? 'selected' : ''}" data-value="${opt.val}">
                                <input type="radio" name="q${idx}" value="${opt.val}" id="q${idx}_${opt.val}" ${answers[idx] === opt.val ? 'checked' : ''}>
                                <label for="q${idx}_${opt.val}">${opt.label}</label>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(card);
            });
            
            attachEvents();
        }

        function attachEvents() {
            document.querySelectorAll('.option').forEach(opt => {
                opt.addEventListener('click', function() {
                    const radio = this.querySelector('input');
                    if (radio) {
                        radio.checked = true;
                        const val = parseInt(this.dataset.value);
                        const card = this.closest('.question-card');
                        const idx = parseInt(card.dataset.index);
                        answers[idx] = val;
                        
                        card.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                        this.classList.add('selected');
                        updateProgress();
                    }
                });
            });
        }

        function updateProgress() {
            const answered = answers.filter(a => a !== null).length;
            const percent = (answered / 30) * 100;
            document.getElementById('progressFill').style.width = `${percent}%`;
        }

        function showQuestion(index) {
            document.querySelectorAll('.question-card').forEach((card, i) => {
                if (i === index) card.classList.add('active');
                else card.classList.remove('active');
            });
            
            document.getElementById('prevBtn').style.display = index === 0 ? 'none' : 'block';
            if (index === 29) {
                document.getElementById('nextBtn').style.display = 'none';
                document.getElementById('submitBtn').style.display = 'block';
            } else {
                document.getElementById('nextBtn').style.display = 'block';
                document.getElementById('submitBtn').style.display = 'none';
            }
        }
