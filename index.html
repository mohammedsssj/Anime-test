<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>اختبار الشخصية - اكتشف شخصيتك الأنمي المناسبة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Tajawal', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            direction: rtl;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            width: 100%;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .questions-area {
            padding: 30px;
            min-height: 500px;
        }

        .question-card {
            display: none;
        }

        .question-card.active {
            display: block;
        }

        .question-text {
            font-size: 22px;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.4;
            font-weight: 500;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: #f5f5f5;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .option:hover {
            background: #e8e8e8;
            transform: translateX(-5px);
        }

        .option.selected {
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            border-color: #764ba2;
        }

        .option input {
            margin-left: 15px;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .option label {
            flex: 1;
            cursor: pointer;
            font-size: 16px;
            color: #333;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }

        .nav-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .prev-btn {
            background: #e0e0e0;
            color: #666;
        }

        .prev-btn:hover {
            background: #d0d0d0;
        }

        .next-btn, .submit-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .next-btn:hover, .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        .gender-section {
            background: #f9f9f9;
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
            text-align: center;
        }

        .gender-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .gender-btn {
            padding: 12px 30px;
            border: 2px solid #764ba2;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .gender-btn.selected {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .result-area {
            padding: 30px;
            display: none;
        }

        .result-card {
            text-align: center;
        }

        .personality-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .personality-code {
            font-size: 36px;
            font-weight: bold;
        }

        .personality-name {
            font-size: 24px;
            margin-top: 10px;
        }

        .anime-character {
            margin-top: 20px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 15px;
        }

        .character-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 15px auto;
            display: block;
            border: 4px solid #764ba2;
        }

        .character-name {
            font-size: 28px;
            color: #764ba2;
            margin: 15px 0;
        }

        .character-source {
            color: #999;
            margin-bottom: 15px;
        }

        .character-desc {
            color: #555;
            line-height: 1.6;
            text-align: justify;
        }

        .strengths, .weaknesses {
            text-align: right;
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
        }

        .strengths {
            background: #e8f5e9;
            border-right: 4px solid #4caf50;
        }

        .weaknesses {
            background: #ffebee;
            border-right: 4px solid #f44336;
        }

        .strengths h4, .weaknesses h4 {
            margin-bottom: 10px;
            color: #333;
        }

        .strengths ul, .weaknesses ul {
            padding-right: 20px;
        }

        .strengths li, .weaknesses li {
            margin: 8px 0;
            color: #555;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 50px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #764ba2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .questions-area {
                padding: 20px;
            }
            .question-text {
                font-size: 18px;
            }
            .option label {
                font-size: 14px;
            }
            .character-name {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">

            <p>أجب عن الأسئلة التالية بدقة لتحديد نمط شخصيتك ومن ثم الشخصية الأنمي التي تناسبك</p>

        <div class="progress-bar">

        <div class="result-area" id="resultArea"></div>
    </div>
